name: API Health Check

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check API Health
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://api.aiservices.to/health)
          echo "Health status: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "::error::API health check failed with status $RESPONSE"
            exit 1
          fi
          echo "API is healthy ✅"

      - name: Verify Paid Endpoints Return 402
        run: |
          # Test that paid endpoints properly return 402 Payment Required
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.aiservices.to/v1/indicators/BTC)
          echo "Indicators endpoint status: $STATUS (expected 402)"
          if [ "$STATUS" != "402" ]; then
            echo "::warning::Expected 402 but got $STATUS"
          fi

      - name: Verify Free Endpoints Return 200
        run: |
          # Test that free endpoints return 200
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.aiservices.to/v1/prices?symbols=BTC)
          echo "Prices endpoint status: $STATUS (expected 200)"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Free endpoint returned $STATUS instead of 200"
            exit 1
          fi

      - name: Verify x402 Discovery
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.aiservices.to/.well-known/x402)
          echo "x402 discovery status: $STATUS (expected 200)"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::x402 discovery returned $STATUS"
          fi

      - name: Verify MCP Endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://api.aiservices.to/mcp)
          echo "MCP endpoint status: $STATUS"
          # MCP may return 400 or 406 without proper headers, which is fine
          if [ "$STATUS" = "000" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
            echo "::error::MCP endpoint returned $STATUS"
            exit 1
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 API Health Check Failed',
              body: `The automated health check failed. Check the workflow run for details: ${context.runId}`,
              labels: ['bug', 'health-check']
            })
