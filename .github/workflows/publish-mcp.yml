name: Publish to MCP Registry

on:
  push:
    branches: [main]
    paths:
      - 'server.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build publisher
        run: |
          git clone https://github.com/modelcontextprotocol/registry.git /tmp/registry
          cd /tmp/registry
          make publisher
          sudo cp bin/mcp-publisher /usr/local/bin/
      - name: Validate server.json
        run: mcp-publisher validate server.json
      - name: Login via DNS
        env:
          MCP_DNS_KEY: ${{ secrets.MCP_DNS_PRIVATE_KEY }}
        run: mcp-publisher login dns --domain aiservices.to --private-key "$MCP_DNS_KEY"
      - name: Publish to MCP Registry
        run: mcp-publisher publish server.json
