name: Publish to MCP Registry

on:
  push:
    branches: [main]
    paths:
      - 'server.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build publisher
        run: |
          git clone https://github.com/modelcontextprotocol/registry.git /tmp/registry
          cd /tmp/registry
          make publisher
          sudo cp bin/mcp-publisher /usr/local/bin/
      - name: Validate server.json
        run: mcp-publisher validate server.json
      - name: Login via GitHub OIDC
        run: mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: mcp-publisher publish server.json
