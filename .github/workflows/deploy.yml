name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Deploy (latest commit)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: e7d88b8a-d2aa-4113-aafa-061615ed4c43
          RAILWAY_ENV_ID: ac26fe55-88a1-4f24-9777-a142af59373b
        run: |
          # Deploy with latestCommit=true to pull fresh code from GitHub
          RESPONSE=$(curl -s -X POST \
            "https://backboard.railway.app/graphql/v2" \
            -H "Project-Access-Token: ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { serviceInstanceDeploy(latestCommit: true, serviceId: \\\"${RAILWAY_SERVICE_ID}\\\", environmentId: \\\"${RAILWAY_ENV_ID}\\\") }\"
            }")

          echo "Deploy response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.data.serviceInstanceDeploy' > /dev/null; then
            echo "Deploy triggered successfully"
          else
            echo "::error::Failed to trigger Railway deploy"
            echo "$RESPONSE"
            exit 1
          fi

      - name: Wait for build and deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: e7d88b8a-d2aa-4113-aafa-061615ed4c43
        run: |
          echo "Waiting for Railway build and deploy..."

          for i in $(seq 1 60); do
            sleep 15
            STATUS=$(curl -s -X POST \
              "https://backboard.railway.app/graphql/v2" \
              -H "Project-Access-Token: ${RAILWAY_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"query\": \"query { service(id: \\\"${RAILWAY_SERVICE_ID}\\\") { deployments(first: 1) { edges { node { status meta } } } } }\"
              }" | jq -r '.data.service.deployments.edges[0].node.status')

            echo "  [$i] Status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ] || [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CRASHED" ]; then
              break
            fi
          done

          if [ "$STATUS" != "SUCCESS" ]; then
            echo "::error::Deploy ended with status: $STATUS"
            exit 1
          fi

          echo "Deploy successful!"

      - name: Health check
        run: |
          sleep 10
          echo "=== Health Check ==="
          curl -sf https://api.aiservices.to/health | jq . || echo "::warning::Health check failed"

      - name: Test free endpoints
        run: |
          echo "=== Testing BTC price ==="
          curl -sf https://api.aiservices.to/v1/price/BTC | jq -r '.symbol,.price_usd' || echo "::warning::Price endpoint failed"
